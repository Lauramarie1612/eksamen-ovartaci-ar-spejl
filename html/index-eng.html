<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ovartaci AR spejl</title>
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <div class="mirror-frame">
      <video class="bg-video" autoplay muted loop playsinline controls>
        <source src="../images/video.mp4" type="video/mp4" />
      </video>
      <div class="mirror-led">
        <main class="container">
          <h1>
            Welcome in all of<br />
            Overtacis identities
          </h1>

          <button
            class="start-btn"
            onclick="window.location.href = 'camera.html'"
          >
            START
          </button>

          <div class="language-selector">
          <button onclick="chooseLanguage('en')">🇬🇧 English</button>
          
          <button onclick="chooseLanguage('da')">🇩🇰 Dansk</button>
          </div>
        </main>
      </div>
    </div>
  
    <script>
    function chooseLanguage(language) {

      localStorage.setItem("sprog", language);

      if (language === "en") {
        window.location.href = "index-eng.html";
      } else {
        window.location.href = "index.html";
      }
    
    }
    </script>
  
  </body>
</html>
