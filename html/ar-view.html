<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Spejl</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .camera-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 30px;
            overflow: hidden;
        }

        #camera-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        #filter-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 2;
            mix-blend-mode: screen;
            opacity: 0.65;
            pointer-events: none;
        }

        .ar-ui {
            position: absolute;
            bottom: 24px;
            left: 0; right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 3;
        }

        #identity-label {
            color: white;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 0.05em;
            text-shadow: 0 1px 6px rgba(0,0,0,0.9);
            margin: 0;
        }

        .back-btn {
            padding: 8px 22px;
            border-radius: 20px;
            background: rgba(0,0,0,0.35);
            color: white;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.4);
            backdrop-filter: blur(6px);
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: rgba(0,0,0,0.55);
        }

        #camera-error {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 4;
            padding: 30px;
        }

        #camera-error p {
            color: #444;
            font-size: 15px;
            line-height: 1.5;
            text-align: center;
            margin: 0;
        }

        #camera-error .back-btn {
            color: #333;
            border-color: #aaa;
            background: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="mirror-frame">
        <div class="mirror-led">
            <div class="camera-wrapper">
                <video id="camera-video" autoplay playsinline muted></video>
                <img id="filter-overlay" src="" alt="">

                <div class="ar-ui">
                    <p id="identity-label"></p>
                    <a href="identiteter.html" class="back-btn">← Vælg anden identitet</a>
                </div>

                <div id="camera-error">
                    <p>Kameraet kunne ikke startes.<br>Kontrollér at du har givet tilladelse.</p>
                    <a href="identiteter.html" class="back-btn">← Tilbage</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const identiteter = [
            { id: 1, Navn: "Louisa Pupparpasta", Billede: "../images/louisa.png",  videoFilter: "hue-rotate(300deg) saturate(1.6) brightness(1.1)" },
            { id: 2, Navn: "Buddhisten",         Billede: "../images/buddha.png",  videoFilter: "hue-rotate(30deg) saturate(1.8) brightness(1.1)" },
            { id: 3, Navn: "Fuglen i paradis",   Billede: "../images/fuglen.png",  videoFilter: "hue-rotate(195deg) saturate(1.6)" },
            { id: 4, Navn: "Dragen",             Billede: "../images/dragen.png",  videoFilter: "hue-rotate(110deg) saturate(1.7)" },
            { id: 5, Navn: "Tigeren",            Billede: "../images/tigeren.png", videoFilter: "hue-rotate(10deg) saturate(2) brightness(1.1)" },
            { id: 6, Navn: "Ovartaci",           Billede: "../images/ovartaci.png",videoFilter: "sepia(0.4) contrast(1.2)" },
        ];

        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get("id"));
        const identitet = identiteter.find(i => i.id === id) || identiteter[0];

        const video    = document.getElementById("camera-video");
        const overlay  = document.getElementById("filter-overlay");
        const label    = document.getElementById("identity-label");
        const errorDiv = document.getElementById("camera-error");

        overlay.src          = identitet.Billede;
        label.textContent    = identitet.Navn;
        video.style.filter   = identitet.videoFilter;

        navigator.mediaDevices
            .getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(() => {
                video.style.display   = "none";
                overlay.style.display = "none";
                document.querySelector(".ar-ui").style.display = "none";
                errorDiv.style.display = "flex";
            });
    </script>
</body>
</html>
